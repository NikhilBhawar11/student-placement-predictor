<!DOCTYPE html>
<html>
<head>

<title>Student Placement Predictor</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.container{
background:white;
color:black;
width:450px;
margin:auto;
margin-top:60px;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

input{
width:90%;
padding:8px;
margin:5px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#2a5298;
color:white;
padding:10px;
border:none;
width:95%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.result{
font-size:20px;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🎓 Student Placement Predictor</h2>

<form action="/predict" method="post">

<input type="text" name="cgpa" placeholder="CGPA" required>
<input type="text" name="internships" placeholder="Internships">
<input type="text" name="projects" placeholder="Projects">
<input type="text" name="workshops" placeholder="Workshops/Certifications">
<input type="text" name="aptitude" placeholder="Aptitude Score">
<input type="text" name="softskills" placeholder="Soft Skills Rating">
<input type="text" name="extra" placeholder="Extracurricular (1=yes 0=no)">
<input type="text" name="training" placeholder="Placement Training (1=yes 0=no)">
<input type="text" name="ssc" placeholder="SSC Marks">
<input type="text" name="hsc" placeholder="HSC Marks">

<button type="submit">Predict Placement</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
